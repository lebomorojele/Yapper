name: Yapper
options:
  bundleIdPrefix: com.yapper
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Yapper:
    path: .
    type: application
    platform: macOS
    sources:
      - path: Yapper
        excludes:
          - "Assets.xcassets/**"
          - "Support/**"
    resources:
      - path: Yapper/Assets.xcassets
      - path: Yapper/Support
    info:
      path: Yapper/Support/Info.plist
      properties:
        CFBundleName: Yapper
        CFBundleDisplayName: Yapper
        CFBundleIdentifier: com.yapper.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.3"
        CFBundlePackageType: APPL
        CFBundleExecutable: Yapper
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSMicrophoneUsageDescription: "Yapper needs microphone access for voice dictation"
        NSAppleEventsUsageDescription: "Yapper needs accessibility access to insert text"
    entitlements:
      path: Yapper/Support/Yapper.entitlements
      properties:
        com.apple.security.device.audio-input: true

targets:
  Yapper:
    type: application
    platform: macOS
    sources:
      - path: Yapper
        excludes:
          - "Assets.xcassets/**"
          - "Support/**"
    resources:
      - path: Yapper/Assets.xcassets
      - path: Yapper/Support
    dependencies:
      - package: Yapper
        product: ParakeetStreamingASR
      - package: Yapper
        product: ParakeetASR
    settings:
      base:
        PRODUCT_NAME: Yapper
        PRODUCT_BUNDLE_IDENTIFIER: com.yapper.app
        MARKETING_VERSION: "0.3"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Yapper/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Yapper/Support/Yapper.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        SWIFT_VERSION: "6.0"

  YapperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/YapperTests
    dependencies:
      - target: Yapper
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yapper.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yapper.app/Contents/MacOS/Yapper"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "6.0"

  YapperUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/YapperUITests
    dependencies:
      - target: Yapper
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yapper.uitests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Yapper.app/Contents/MacOS/Yapper"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "6.0"