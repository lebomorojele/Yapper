name: Build & Release Yapper DMG

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: yapper-release
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS DMG + Appcast
    runs-on: macos-15-arm64
    permissions:
      contents: write
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Read version from Info.plist
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Yapper/Support/Info.plist)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Yapper v$VERSION"

      - name: Build Swift application
        run: swift build -c release

      - name: Package DMG
        run: scripts/package-dmg.sh
        env:
          ALLOW_PLACEHOLDER_SPARKLE_KEY: "1"

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          TAG="v$VERSION"
          gh release create "$TAG" dist/Yapper-*.dmg dist/Yapper-*.dmg.sha256 \
            --title "Yapper $VERSION" \
            --notes "Release Yapper $VERSION" \
            --repo ${{ github.repository }} \
            --verify-tag 2>/dev/null || \
          gh release upload "$TAG" dist/Yapper-*.dmg dist/Yapper-*.dmg.sha256 \
            --repo ${{ github.repository }} \
            --clobber
          echo "RELEASE_TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Generate signed Sparkle appcast
        run: scripts/generate-appcast.sh
        env:
          DOWNLOAD_URL_PREFIX: "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}"
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

      - name: Verify appcast signature
        run: |
          grep -q 'edSignature=' dist/sparkle/appcast.xml && echo "Appcast is signed ✓" || (echo "Appcast is NOT signed!" && exit 1)

      - name: Copy appcast to website
        run: |
          cp dist/sparkle/appcast.xml ../website/public/appcast.xml
          rm -f ../website/public/downloads/Yapper-*.dmg ../website/public/downloads/Yapper-*.dmg.sha256 ../website/public/downloads/Yapper-latest.dmg ../website/public/downloads/Yapper-latest.dmg.sha256

      - name: Commit and push appcast
        working-directory: .
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/appcast.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update appcast for v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push
