name: Build & Release Yapper DMG

on:
  workflow_dispatch:

concurrency:
  group: yapper-release
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS DMG + Appcast
    runs-on: macos-15-arm64
    permissions:
      contents: write
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Swift application
        run: swift build -c release

      - name: Package DMG
        run: scripts/package-dmg.sh
        env:
          ALLOW_PLACEHOLDER_SPARKLE_KEY: "1"

      - name: Generate Sparkle appcast
        run: scripts/generate-appcast.sh
        env:
          DOWNLOAD_URL_PREFIX: "https://yapper.party/downloads"

      - name: Verify build artifacts
        run: |
          echo "=== DMG files ==="
          ls -lh dist/*.dmg 2>/dev/null || echo "No DMG found!"
          echo "=== SHA256 ==="
          ls -lh dist/*.sha256 2>/dev/null || echo "No SHA256 found!"
          echo "=== Appcast ==="
          ls -lh dist/sparkle/ 2>/dev/null || echo "No appcast found!"
          test -f dist/sparkle/appcast.xml || exit 1

      - name: Copy artifacts to website/public
        run: |
          mkdir -p ../website/public/downloads
          cp dist/Yapper-*.dmg ../website/public/downloads/
          cp dist/Yapper-*.dmg.sha256 ../website/public/downloads/ || true
          cp dist/sparkle/appcast.xml ../website/public/appcast.xml
          # Always copy the latest version as Yapper-latest.dmg
          latest_dmg=$(ls -t dist/Yapper-*.dmg | head -1)
          cp "$latest_dmg" ../website/public/downloads/Yapper-latest.dmg
          echo "=== Website public ==="
          ls -lhR ../website/public/downloads/
          ls -lh ../website/public/appcast.xml

      - name: Configure git for push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push artifacts
        working-directory: .
        run: |
          git add -f website/public/downloads/ website/public/appcast.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update DMG and appcast [skip ci]"
          git push